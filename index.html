<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShareCare – دخول</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo">Share<span>Care</span></div>
      <div class="sub">تبادل الفائض • أثر اجتماعي</div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">تسجيل الدخول</button>
        <button class="auth-tab" data-tab="register" onclick="switchAuthTab('register')">إنشاء حساب</button>
      </div>

      <!-- نموذج الدخول -->
      <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="loginEmail" placeholder="example@domain.com" required />
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn">🚪 دخول</button>
      </form>

      <!-- نموذج التسجيل -->
      <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>الاسم الكامل</label>
          <input type="text" id="regName" placeholder="اسمك" required />
        </div>
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="regEmail" placeholder="example@domain.com" required />
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="regPassword" placeholder="••••••••" required />
        </div>
        <div class="form-group">
          <label>تأكيد كلمة المرور</label>
          <input type="password" id="regConfirm" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn gold">➕ إنشاء حساب</button>
      </form>

      <div class="guest-link">
        <a href="home.html">👀 استكشف كزائر</a>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>
  <script src="script.js"></script>
</body>
</html>
